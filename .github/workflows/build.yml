name: Build macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装 PyInstaller
        run: python3 -m pip install --upgrade pyinstaller

      - name: 打包 .app
        run: |
          python3 -m PyInstaller \
            --windowed \
            --noconfirm \
            --clean \
            --name "SubtitleToolPro" \
            --osx-bundle-identifier "com.pharmatalkstudio.subtitletool" \
            subtitle_tool.py

      - name: 压缩为 zip（保留 .app 结构）
        run: |
          cd dist
          ditto -c -k --keepParent "SubtitleToolPro.app" "字幕工具Pro-macOS.zip"

      - name: 上传到 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/字幕工具Pro-macOS.zip
          generate_release_notes: true

      - name: 上传为 Artifact（手动触发时下载）
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: SubtitleToolPro-macOS
          path: dist/字幕工具Pro-macOS.zip
